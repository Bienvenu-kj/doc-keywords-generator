<main class="px-4 flex h-dvh border flex-col items-center justify-center gap-10">
  <section class="flex flex-col gap-4 items-center">
    <div class="">
      <img class="size-22" src="doc-keywords-generator-logo~3 (6).webp" alt="Dockygen logo" />
      <h1 class="text-2xl font-bold">Dockygen</h1>
    </div>
    <p class="text-pretty text-center text-gray-500">
      Générez automatiquement les mots-clés pour vos documents PDF ou texte.
    </p>
  </section>
  <section class="flex">
    <form action="" class="flex flex-col items-center gap-7">
      <section class="relative rounded-2xl flex flex-col items-center">
        <div
          class="border-dashed border-blue-violet-900 rounded-2xl p-4 border-2 flex bg-white pointer-events-none relative z-2 flex-col items-center gap-0.5"
        >
          <span
            class="mb-4 bg-blue-violet-900 border border-blue-violet-800/0 size-10 rounded-full flex justify-center items-center"
          >
            <i-lucide [img]="uploadIcon" class="text-blue-violet-400"></i-lucide>
          </span>
          <span class="font-bold text-balance text-center">Choisissez un document ou glissez-le ici</span>
          <span class="text-sm font-medium text-gray-400 text-muted-foreground"> PDF ou Text </span>
        </div>
        <input
          accept=".pdf,.txt"
          class="z-1 absolute size-full rounded-2xl"
          type="file"
          name="file"
          id="file-input"
        />
      </section>
      <button
        class="font-bold shadow-md text-white shadow-violet-600/40 w-full border border-blue-violet-500 rounded-lg bg-blue-violet p-2"
        type="submit"
      >
        Generez les mots-clés
      </button>
    </form>
  </section>
</main>
